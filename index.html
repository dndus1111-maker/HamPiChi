<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>테트리스</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="side-panel left-panel">
            <div class="panel-box">
                <h3>HOLD</h3>
                <canvas id="holdCanvas" width="100" height="100"></canvas>
            </div>
        </div>

        <div class="main-board">
            <canvas id="gameCanvas" width="300" height="600"></canvas>
            <div id="overlay" class="overlay">
                <div class="overlay-content">
                    <h1 id="overlayTitle">테트리스</h1>
                    <p id="overlayMessage">Press ENTER to Start</p>
                </div>
            </div>
        </div>

        <div class="side-panel right-panel">
            <div class="panel-box">
                <h3>NEXT</h3>
                <canvas id="nextCanvas" width="100" height="300"></canvas>
            </div>
            <div class="panel-box">
                <h3>SCORE</h3>
                <p id="score" class="stat-value">0</p>
            </div>
            <div class="panel-box">
                <h3>LEVEL</h3>
                <p id="level" class="stat-value">1</p>
            </div>
            <div class="panel-box">
                <h3>LINES</h3>
                <p id="lines" class="stat-value">0</p>
            </div>
        </div>
    </div>

    <div class="controls-info">
        <p>← → 이동 &nbsp;|&nbsp; ↑ 회전 &nbsp;|&nbsp; ↓ 소프트드롭 &nbsp;|&nbsp; Space 하드드롭 &nbsp;|&nbsp; C 홀드 &nbsp;|&nbsp; P 일시정지</p>
    </div>

    <script src="game.js"></script>
</body>
</html>
